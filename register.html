<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-page">
    <form id="register-form" class="login-form" novalidate>
      <h1>Create an account</h1>

      <div class="form-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
        <p id="username-error" class="field-error" role="alert"></p>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required />
        <p id="password-error" class="field-error" role="alert"></p>
      </div>

      <div class="form-field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required />
        <p id="confirm-password-error" class="field-error" role="alert"></p>
      </div>

      <button type="submit">Register</button>

      <p id="form-status" class="form-status" role="status"></p>

      <p class="form-footer"><a href="index.html">Already have an account? Log in</a></p>
    </form>
  </main>

  <script src="src/validation.js"></script>
  <script src="src/register.js"></script>
</body>
</html>
